site_name: 电商知识库
site_description: 跨境电商、阿里巴巴电商、平台运营、供应链、物流、支付、税务与营销学习笔记
site_url: https://chenzhengduan.github.io/chzd/
docs_dir: docs
site_dir: .site

theme:
  name: material
  language: zh
  features:
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: deep orange

extra_css:
  - assets/styles/mobile.css
  - assets/styles/resume.css

plugins:
  - awesome-pages:
      sort_type: natural
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
